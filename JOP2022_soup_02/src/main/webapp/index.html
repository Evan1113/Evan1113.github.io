<html>
<head>
    <title>TODO supply a title</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="home.css" />
    <script type="text/javascript" src="jsLibrary_Home.js"></script>
    <script type = "text/javascript" src = "https://d3js.org/d3.v4.min.js"></script>
    <script src="jsLibrary_Home.js"></script>
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="visualChart.js" defer></script>
    
</head>
<body onload="getWebMetrix();"> 
<div id="banner">爬蟲資料處理</div>
    <div id="content">
        <div id="leftAreaFunction" >
        <label for="Question">爬蟲字典</label>
        <select name="fileName" id="selectedFile" style="width: 120px;">
            <option value="TexttileCompanies_v5.csv">公司清單</option>
            <option value="transaction.csv">transaction</option>
            <option value="attendance.csv">出席紀錄</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select><br>

        <div class="flex-box">    
            <form action="CSVservlet" target="iframe_A">
                <input type="hidden" name="actionID" value="showFields">
                <input type="hidden" id="fileName_1" name="fileName" value="">
                <input type="submit" onclick="getFileName();" value="欄位清單">
            </form>           
            <form action="CSVservlet" target="iframe_A">
                <input type="hidden" name="actionID" value="browse">
                <input type="hidden" id="fileName_2" name="fileName" value="">
                <input type="submit" onclick="getFileName();" value="檔案瀏覽">
            </form>      
        </div>    
        <div class="flex-box">    
            <form action="CSVservlet" target="iframe_fieldsList_2">
                <input type="hidden" name="actionID" value="soupList">
                <input type="hidden" id="fileName_4" name="fileName" value="">
                <input type="submit" onclick="getFileName();showSoupDiv();" value="列舉欄位">
            </form>                             
            <form>
                <input type="hidden" name="actionID" value="fieldList">
                <input type="hidden" id="fileName_3" name="fileName" value="">
                <input type="submit" value="保留位置">
            </form>  
        </div>
        <div class="flex-box">
            <button style="font-family: 標楷體; font-size: 16px; color: red; margin: 5px;" onclick="getChartDataAndShow();">統計視覺</button>
        </div>
        <br>
        <div id="serchDiv" style="visibility: hidden;">
            <input type="text" value="以下做欄位的爬蟲搜尋" style="border:0px; background-color: greenyellow; font-family: 標楷體;"><br><br>
            <iframe width="180" height="35" id="iframe_fieldsList_1" name="iframe_fieldsList_1" style="border:0; background-color:greenyellow; "></iframe><br><br> 
            <form action="CSVservlet" target="iframe_A" >
                <input type="hidden" name="actionID" value="searchField">
                <input type="hidden" id="fileName_5" name="fileName" value="">
                <input type="hidden" id="fieldNo_1" name="fieldNo" value="">
                <div class="flex-box">
                    <input type="text" name="searchValue" value="" size="10" class="flex-box.input">
                    <input type="submit" onclick="getFileName();getFieldName(); " value="搜尋" class="flex-box.input">
                </div>
            </form>          
        </div>
        <div id="soupDiv" style="visibility: hidden;">
            <input type="text" value="以下鎖定欄位爬尋" style="border:0px; background-color: greenyellow; font-family: 標楷體;"><br><br>
            <iframe width="180" height="35" id="iframe_fieldsList_2" name="iframe_fieldsList_2" style="border:0; background-color:greenyellow; "></iframe><br><br>
            <form action="CSVservlet" target="iframe_A">
                <input type="hidden" name="actionID" value="soupAction">
                <input type="hidden" id="fileName_6" name="fileName" value="">
                <input type="hidden" id="fieldNo_2" name="fieldNo" value="">
                <div class="flex-box">
                    <input type="text" name="searchValue" value="" size="10">
                    <input type="submit" onclick="getFileName();getFieldName();openloadingDiv();" value="爬蟲欄位">
                </div>
            </form>
        </div>
        <div id="loading">
            <div class="loadingcss">
                <p class="loadingtextcss">正在搜尋中,請稍等...</p>
            </div>
                
        </div>
        
    </div>
        
    <div id="rightAreaDisplay" style="width:85%;height:100%" >
        <iframe width="0" height="0" id="iframe_A" name="iframe_A" style="background-color: powderblue" onload="loadingDiv()"></iframe>
        <svg class="chart" width="600" height="330" style="margin-left:10px;"></svg>
    </div>


</div>

</body>
</html>
